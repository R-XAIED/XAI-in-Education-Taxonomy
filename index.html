<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAI in Education Taxonomy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Inter, Arial, sans-serif;
    background: white;
    color: #0f172a;
}

.container { max-width: 100%; padding: 24px; }

nav {
    border-bottom: 1px solid #e2e8f0;
    padding-bottom: 15px;
    margin-bottom: 30px;
    font-weight: 600;
    color: #475569;
}

h1 {
    font-size: 2.2rem;
    margin-bottom: 30px;
    line-height: 1.15;
}

.taxonomy-wrapper {
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
}

.column {
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 12px;
    min-width: 0;
}

.column-header {
    height: 60px;
    border-bottom: 1px solid #f1f5f9;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
}

.column-title {
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    line-height: 1.3;
}

.column-icon {
    width: 22px;
    height: 22px;
    color: #64748b;
    flex-shrink: 0;
}

.column-icon svg {
    width: 100%;
    height: 100%;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.block { margin-bottom: 8px; }

.block button {
    width: 100%;
    min-height: 46px;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    font-size: 11px;
    padding: 7px 6px;
    cursor: pointer;
    white-space: normal;
    line-height: 1.2;
}

.children {
    display: none;
    margin-top: 8px;
    padding: 9px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 10.5px;
    line-height: 1.45;
}

.children ul { padding-left: 16px; }
.children li { margin-bottom: 6px; }

.info {
    display: inline-block;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    border: 1px solid #64748b;
    background: white;
    color: #64748b;
    text-align: center;
    line-height: 13px;
    font-size: 9px;
    font-weight: bold;
    margin-left: 5px;
    cursor: pointer;
}

.section-divider {
    margin: 12px 0;
    text-align: center;
    font-size: 8px;
    font-weight: bold;
    text-transform: uppercase;
    color: #64748b;
    border-top: 1px dashed #94a3b8;
    border-bottom: 1px dashed #94a3b8;
    padding: 5px 0;
}

.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.modal {
    background: white;
    width: 100%;
    max-width: 560px;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,.2);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 14px;
}

.modal-title {
    font-size: 18px;
    font-weight: 700;
}

.modal-close {
    border: none;
    background: transparent;
    font-size: 24px;
    cursor: pointer;
    color: #64748b;
}

.modal-body {
    font-size: 14px;
    line-height: 1.6;
    color: #334155;
}

.modal-body strong {
    display: block;
    margin-top: 12px;
    color: #0f172a;
}

@media (max-width: 1100px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 650px) {
    .container { padding: 16px; }
    h1 { font-size: 1.7rem; }
    .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="container">
<nav>XAI in Education</nav>

<h1>Taxonomy of User-centred Explainable Artificial Intelligence in Education</h1>

<div class="taxonomy-wrapper">
    <div class="grid" id="taxonomyGrid"></div>
</div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Information</div>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
const icons = {
users: `<svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
puzzle: `<svg viewBox="0 0 24 24"><path d="M19 13h-2a2 2 0 1 0 0 4h2v4H5v-4h2a2 2 0 1 0 0-4H5V3h4v2a2 2 0 1 0 4 0V3h6z"/></svg>`,
balance: `<svg viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M5 7h14"/><path d="M7 7l-3 5h6z"/><path d="M20 12l-3-5-3 5z"/><path d="M8 21h8"/></svg>`,
chart: `<svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16v-5"/><path d="M12 16V8"/><path d="M17 16v-9"/></svg>`,
leaf: `<svg viewBox="0 0 24 24"><path d="M20 4C10 4 4 10 4 20"/><path d="M20 4c0 8-4 14-12 16"/></svg>`
};

const taxonomy = [
{
title:"End users",
icon:"users",
colors:["#DA7010","#FFA757","#FFB979","#FFD1A6"],
items:["Students","Educators","Study advisors","School leaders"]
},
{
title:"XAI System Properties",
icon:"puzzle",
colors:["#3E2724","#6D4B3E","#8D6E63","#B8A8A3","#C8B9B3"],
items:[
{
label:"AIED application area",
children:[
{text:"Adaptive systems & personalisation",definition:"AI systems that adapt the characteristics of the learning environment to learner characteristics.",example:"A system that recommends math exercises tailored to the student mastery level (Ooge et al., 2023)."},
{text:"Profiling & prediction",definition:"AI systems that generate learner models or profiles that allow prediction.",example:"A system that predicts student success (Scheers & De Laet, 2022)."},
{text:"Assessment & evaluation",definition:"AI systems that support assessment and evaluation tasks.",example:"A system that predicts grades for student answers (Schlippe et al., 2023)."},
{text:"Intelligent tutoring systems",definition:"AI systems that act as digital tutors that support learning step-by-step problem-solving.",example:"A system that gives an answer to a math problem together with step-by-step explanation (Worden et al., 2025)."}
]
},
{
label:"Explanation scope",
children:[
{text:"Global explanations",definition:"Explanation about the general model behaviour.",example:"Explanation about the different criteria that were taken into account to base the AI grade on (Conijn et al., 2023)."},
{text:"Local explanations",definition:"Explanation about the specific output.",example:"Highlighting the words that have an influence on the output (Wang et al., 2024b)."}
]
},
{
label:"Explanation type",
children:[
{text:"Feature-based",definition:"Revealing the features that influence the system output.",example:"Visualizing the features that contribute to students’ academic performance (Brdnik et al., 2022)."},
{text:"Model specifications",definition:"Explaining model workings or providing performance metrics.",example:"Presenting the confidence of the system in predicted grade, indicated with ‘easy to grade’ or ‘hard to grade’ (Li et al., 2025b)."},
{text:"GenAI-based",definition:"Providing natural language explanations by GenAI.",example:"Providing GenAI-based explanations for a score the system gives on an open student answer (Li et al., 2025c)."},
{text:"Contrastive",definition:"Showing why an output occurred and not another output.",example:"Presenting ‘what-if explanations’ that show what happens to the users’ level if exercises are solved correctly (Ooge et al., 2025)."},
{text:"Rule-based",definition:"Providing human-readable rules.",example:"Visualizing predefined rules of an agent that recommends career paths (Zylowski et al., 2024)."},
{text:"Similar example-based",definition:"Showing similar instances with the same predictions.",example:"Showing student answers that received the same predicted grade (Schlippe et al., 2023)."},
{text:"Dependence plots",definition:"Showing how one or two features influence output, including their interactions.",example:"Showing that academic scores contribute to student success, and that the probability of success increases with better mathematical skills (Nagy et al., 2023)."}
]
},
{
label:"Explanation format",
children:[
{text:"Textual",definition:"The explanation is provided in a textual way.",example:"A text-based chatbot supports students in understanding learning path recommendations (Abu-Rasheed et al., 2024)."},
{text:"Graphical",definition:"The explanation is provided graphically, including tables, text highlights, graphs, plots, and images.",example:"An essay scoring system leverages visual indicators to show whether a student’s response meets the expected standard (Hartmann & Robert, 2023)."},
{text:"Numerical",definition:"The explanation is provided via numbers.",example:"The system presents the average percentage of success (Feldman-Maggor et al., 2025)."}
]
},
{
label:"Interactivity of explanations",
children:[
{text:"Passive",definition:"User cannot interact with explanations.",example:"User cannot interact with the dashboard (Hartmann & Hobert, 2023)."},
{text:"Interactive",definition:"User can ask for additional details or engage in dialogue.",example:"Users can choose if they want an explanation and what kind of explanation (Conati et al., 2021)."}
]
}
]
},
{
title:"Compared Conditions",
icon:"balance",
colors:["#7F2A24","#B3473A","#D97A6C"],
items:["Explanations vs. no explanations","XAI system vs. no XAI system","Different explanations"]
},
{
title:"Outcome Variables & Methods",
icon:"chart",
colors:["#2F4D5D","#4F7FAA","#90B3D0","#0050B0","#86AEE3"],
items:[
{type:"section",label:"Explanation effects"},
{
label:"Affective effects",
children:[
{text:"Confidence for task (SR)",definition:"Perceived competence for the task at hand, while interacting with the system.",example:"Survey. Single item: “Confidence in performing sutures”, 10-point Likert (Gomez et al., 2025)."},
{text:"Ease of use of the system (SR)",definition:"Perceived ease to use the system.",example:"Survey. Single item: “Do you agree that the JEDAI.Ed system made it easier for you to provide instructions to a robot for performing tasks?”, 4-point Likert (Karia et al., 2025)."},
{text:"Usefulness of the system (SR)",definition:"Perceived extent to which the explanation helps the user achieve a specific goal.",example:"Survey. Single item: “The AI assistant could help evaluate more consistent and fair”, 5-point Likert (Schlippe et al., 2023)."},
{text:"Usefulness + ease of use of the system (SR)",definition:"Combination of perceived usefulness and perceived ease of use.",example:"Survey adapted from Hwang et al. (2013), 13 items, 6-point Likert (Wang & Chen, 2024)."},
{text:"Usability of the system (SR)",definition:"Perceived effectiveness, intuitiveness and smoothness of the system.",example:"System Usability Scale, 10 questions + 2 open questions (Buñay-Guisñan et al., 2026)."},
{text:"Trust in the system (SR)",definition:"Perceived user confidence that the system and its output are accurate.",example:"Survey. Single item: “I trust Wiski to recommend me math exercises”, 7-point Likert (Ooge et al., 2023)."},
{text:"General satisfaction with the system (SR)",definition:"Perceived level of fulfilment while interacting with the system.",example:"Survey. Opinions on usefulness, intrusiveness, and understanding (Bahel et al., 2025)."},
{text:"Intention to perform behaviour (SR)",definition:"Perceived likelihood or readiness to carry out a specific behaviour.",example:"Survey on study-related behaviours, asking how likely participants were to perform the behaviour, 14 items, 5-point Likert (Abdulrahman et al., 2021)."},
{text:"Willingness to accept system (SR)",definition:"Perceived extent to which users are inclined to adopt or follow outputs provided by a system.",example:"Interview question about how explanations affected willingness to accept recommendations (Clarke & Mitrović, 2024)."}
]
},
{
label:"Cognitive effects",
children:[
{text:"Cognitive load (SR)",definition:"Perceived cognitive load while using the system.",example:"Survey on mental load and effort while completing the task, adapted from Hwang et al. (2013), 13 items, 6-point Likert (Wang et al., 2024b)."},
{text:"Learning outcomes",definition:"The degree to which a user's knowledge or skills improve as a result of interacting with the system.",example:"Pre- and post-test to capture learning gains (Hur et al., 2022)."},
{text:"Understanding of the system (SR)",definition:"Perceived ability to correctly interpret the system behaviour.",example:"Survey based on Li et al. (2008) and Madsen & Gregor (2000), 6-point Likert (Hartmann & Robert, 2023)."},
{text:"Understanding of the system",definition:"The internal representation a user forms of how an AI system functions.",example:"Multiple-choice test created by two system experts, 10 questions (Lu et al., 2024)."}
]
},
{
label:"Behavioral effects",
children:[
{text:"Reliance on AI output",definition:"User's willingness to provide control to the system for the given task.",example:"Log data. Selection of the recommended problem via click data (Clarke & Mitrović, 2024)."},
{text:"Self-regulated learning behaviour",definition:"Observable self-regulated learning behaviours a user exhibits while interacting with the system.",example:"Log data. Quiz and reading logs, including quiz reread and test retake (Hur et al., 2022)."},
{text:"Task efficiency",definition:"The speed at which a task can be performed.",example:"Log data capturing the time participants spent grading each individual answer (Li et al., 2025b)."},
{text:"Task effectiveness",definition:"User's performance while using the system.",example:"Percentage of correctly scored answers in case of correct AI prediction versus incorrect AI prediction (Schlippe et al., 2023)."},
{text:"User-system interaction behaviour",definition:"Users' interactions with the system interface that do not directly influence performance.",example:"Eye-tracking using a Tobii eye-tracker to capture points of attention on the screen (Bahel et al., 2025)."}
]
},
{type:"section",label:"Explanation evaluations"},
{
label:"Affective evaluations",
children:[
{text:"Actionability of explanations (SR)",definition:"Perceived extent to which explanations help to take concrete actions or make decisions based on the provided information.",example:"Survey. Single item: “This explanation helps me to make a decision on how to improve my learning behaviour”, 5-point Likert (Swamy et al., 2023)."},
{text:"Correctness of explanations (SR)",definition:"Perceived level of the truth contained in the explanation.",example:"Survey. Single item: “The explanation establishes accurate causal reasoning based on course descriptions and prior student performance”, 6-point Likert (Li et al., 2025a)."},
{text:"General satisfaction with explanations (SR)",definition:"Satisfaction with explanations of the system.",example:"Survey. Explanation Satisfaction Scale by Hofmann (2023), 8 items, 5-point Likert (Brdnik et al., 2023)."},
{text:"Necessity of explanations (SR)",definition:"Perceived extent to which only the reasons that cause the decision were selected.",example:"Survey. Single item: “Every detail of this explanation is necessary”, 5-point Likert (Swamy et al., 2025)."},
{text:"Preference of explanations (SR)",definition:"The preferred explanation in terms of scope, type, and format.",example:"Interview. Participants were asked about preferred learning analytics dashboard (Scheers & De Laet, 2021)."},
{text:"Trust in explanation (SR)",definition:"Perceived trust in the explanation.",example:"Survey. Single item: “The explanations lets me judge if I should trust the suggestions”, 5-point Likert (Swamy et al., 2025)."},
{text:"Usability of explanations (SR)",definition:"Perceived effectiveness, intuitiveness, and smoothness of the explanations.",example:"Survey. System Usability Scale (SUS) by Brooke (1996), 10 items, 5-point Likert (Scheers & De Laet, 2021)."},
{text:"Usefulness of explanation (SR)",definition:"Perceived usefulness of the explanation.",example:"Interview. Example questions: “Do you see any added value of using X in this scenario? What specific changes or improvements would you recommend for X to increase usefulness?” (Szymanski et al., 2024)."}
]
},
{
label:"Cognitive evaluations",
children:[
{text:"Understanding of explanations (SR)",definition:"Perceived ability to correctly interpret the explanation generated by the system.",example:"Survey. Single item: “The explanation is easy to comprehend with clearly stated reasoning”, 6-point Likert (Li et al., 2025a)."},
{text:"Understanding of explanations",definition:"Ability to correctly interpret the explanation generated by the system.",example:"Test. Percentage of correct answers (Nagy & Molontay, 2024)."}
]
}
]
},
{
title:"Ecological Validity",
icon:"leaf",
colors:["#436E50","#8BC08F","#AED6AE","#E5E789"],
items:[
{
label:"Impact",
children:[
{text:"High",definition:"Participation in the study has real-world consequences for educational stakeholders.",example:"Educators were asked to grade students after receiving AI suggestions; however, the grades did not affect real student grades (Li et al., 2025a)."},
{text:"Low",definition:"Illustrative or experimental scenarios without direct consequences for educational stakeholders.",example:"Students of a programming course received a dashboard that provided insights about their predicted performance on the final exam. This intervention was deployed in a real course during a full semester (Afzaal et al., 2023)."}
]
},
{
label:"User-input data relation",
children:[
{text:"High",definition:"System uses participants’ own context-specific data.",example:"Students had to perform a suturing task. The AI feedback was based on their own video materials (Gomez et al., 2025)."},
{text:"Low",definition:"System uses data originating from generic, synthetic, or third-party sources, such as simulated data or data from existing datasets.",example:"Students interacted with a system that presented the dropout risk of students in a pre-existing dataset (Nagy & Molontay, 2024)."}
]
},
{
label:"Output realism",
children:[
{text:"High",definition:"Outputs and explanations are genuinely AI-generated.",example:"Preservice teachers were presented with an educational counselling system based on a large language model that used retrieval-augmented generation to ground AI-generated responses in educational expertise. The system also explained whether suggested strategies were supported by evidence from prior cases or derived by the model itself (Fan et al., 2025)."},
{text:"Medium",definition:"Either outputs or explanations are not genuinely AI-generated.",example:"Teachers were shown a dashboard with AI-based groups of students, or clusters, based on their performance. It also displayed explanations focusing on the strengths and weaknesses of these clusters. These explanations were written by experts."},
{text:"Low",definition:"Neither outputs nor explanations are genuinely AI-generated.",example:"Students interacted with a Wizard-of-Oz system that appeared to automatically grade their essays and explain these grades (Conijn et al., 2023)."}
]
},
{
label:"Learning and teaching activity",
children:[
{text:"High",definition:"Participants engage in actual teaching and learning activities.",example:"Students were asked to write a short essay, a learning activity, that served as input for an explainable automated essay-scoring system (Conijn et al., 2023)."},
{text:"Low",definition:"Participants do not engage in actual teaching and learning activities.",example:"Educators were presented with different grading interfaces for evaluating student essays. However, rather than using the interfaces in an actual grading context, participants were only asked to provide self-reported evaluations of the systems (Hartmann & Robert, 2023)."}
]
}
]
}
];

const grid = document.getElementById("taxonomyGrid");
const modalOverlay = document.getElementById("modalOverlay");
const modalTitle = document.getElementById("modalTitle");
const modalBody = document.getElementById("modalBody");
const modalClose = document.getElementById("modalClose");

function openModal(title, definition, example) {
    modalTitle.textContent = title;
    modalBody.innerHTML = `
        <strong>Definition</strong>
        <p>${definition || "Definition to be added."}</p>
        <strong>Example</strong>
        <p>${example || "Example to be added."}</p>
    `;
    modalOverlay.style.display = "flex";
}

function closeModal() {
    modalOverlay.style.display = "none";
}

modalClose.addEventListener("click", closeModal);

modalOverlay.addEventListener("click", event => {
    if (event.target === modalOverlay) closeModal();
});

document.addEventListener("keydown", event => {
    if (event.key === "Escape") closeModal();
});

taxonomy.forEach(group => {
    const column = document.createElement("div");
    column.className = "column";

    column.innerHTML = `
        <div class="column-header">
            <div class="column-title">${group.title}</div>
            <div class="column-icon">${icons[group.icon]}</div>
        </div>
    `;

    let colorIndex = 0;

    group.items.forEach(item => {
        if (item.type === "section") {
            const divider = document.createElement("div");
            divider.className = "section-divider";
            divider.textContent = item.label;
            column.appendChild(divider);
            return;
        }

        const block = document.createElement("div");
        block.className = "block";

        const color = group.colors[colorIndex] || group.colors[group.colors.length - 1];
        colorIndex++;

        const expandable = typeof item === "object" && item.children;
        const label = expandable ? item.label : item;

        const button = document.createElement("button");
        button.textContent = label;
        button.title = label;
        button.style.backgroundColor = color;

        block.appendChild(button);

        if (expandable) {
            const childrenDiv = document.createElement("div");
            childrenDiv.className = "children";

            const ul = document.createElement("ul");

            item.children.forEach(child => {
                const li = document.createElement("li");

                if (typeof child === "object") {
                    li.append(child.text);

                    const info = document.createElement("span");
                    info.className = "info";
                    info.textContent = "i";
                    info.addEventListener("click", event => {
                        event.stopPropagation();
                        openModal(child.text, child.definition, child.example);
                    });

                    li.appendChild(info);
                } else {
                    li.append(child);

                    const info = document.createElement("span");
                    info.className = "info";
                    info.textContent = "i";
                    info.addEventListener("click", event => {
                        event.stopPropagation();
                        openModal(child, "", "");
                    });

                    li.appendChild(info);
                }

                ul.appendChild(li);
            });

            childrenDiv.appendChild(ul);

            button.addEventListener("click", () => {
                childrenDiv.style.display =
                    childrenDiv.style.display === "block" ? "none" : "block";
            });

            block.appendChild(childrenDiv);
        }

        column.appendChild(block);
    });

    grid.appendChild(column);
});
</script>

</body>
</html>
